<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#120224" />
      <stop offset="100%" stop-color="#020005" />
    </radialGradient>
    <!-- Border Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <!-- Text / Letter Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a1a1aa" />
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feColorMatrix type="matrix" values="
        1 0 0 0 0.93
        0 1 0 0 0.28
        0 0 1 0 0.60
        0 0 0 1 0
      " />
      <feMerge>
        <feMergeNode result="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circular Base with border -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="12" filter="url(#neonGlow)" />

  <!-- Serif Letter "V" in Lora style -->
  <text x="215" y="340" 
        font-family="Lora, Georgia, 'Times New Roman', serif" 
        font-size="240" 
        font-weight="bold" 
        fill="url(#textGrad)" 
        text-anchor="middle">V</text>

  <!-- Elegant glowing dot to represent the animated "Void." theme -->
  <circle cx="330" cy="315" r="22" fill="#ec4899" filter="url(#dotGlow)" />
</svg>
